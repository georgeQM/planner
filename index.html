<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Planner</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Fraunces:ital,wght@0,300;0,500;0,700;1,300&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f2ee;
    --surface: #ffffff;
    --surface2: #f0ece6;
    --border: #e0d9d0;
    --text: #1a1714;
    --text2: #6b6259;
    --text3: #a89e94;
    --accent: #c17f4a;
    --accent-light: #f5e6d5;
    --hour-h: 64px;
    --pool-w: 220px;
  }

  body {
    font-family: 'DM Mono', monospace;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* TOP BAR */
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 20px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .logo {
    font-family: 'Fraunces', serif;
    font-size: 18px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.5px;
  }

  .logo span { color: var(--accent); }

  /* 7-DAY STRIP */
  .week-strip {
    display: flex;
    gap: 4px;
    background: var(--surface);
    padding: 0 20px 12px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .day-btn {
    flex: 1;
    padding: 8px 4px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: none;
    cursor: pointer;
    text-align: center;
    transition: all 0.15s;
  }

  .day-btn:hover { background: var(--surface2); }

  .day-btn.active {
    background: var(--text);
    border-color: var(--text);
    color: var(--bg);
  }

  .day-btn .dow {
    font-size: 10px;
    color: inherit;
    opacity: 0.6;
    display: block;
    margin-bottom: 2px;
  }

  .day-btn .dom {
    font-size: 15px;
    font-weight: 500;
    color: inherit;
    display: block;
  }

  .day-btn.active .dow,
  .day-btn.active .dom { color: var(--bg); opacity: 1; }

  .day-btn.today .dom { color: var(--accent); }
  .day-btn.active.today .dom { color: var(--bg); }

  /* MAIN LAYOUT */
  .main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* TASK POOL */
  .pool {
    width: var(--pool-w);
    flex-shrink: 0;
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    background: var(--surface);
    overflow: hidden;
  }

  .pool-header {
    padding: 14px 14px 10px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .pool-title {
    font-size: 11px;
    letter-spacing: 1.5px;
    color: var(--text3);
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .quick-add {
    display: flex;
    gap: 6px;
  }

  .quick-add input {
    flex: 1;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    padding: 6px 8px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--surface2);
    color: var(--text);
    outline: none;
    min-width: 0;
  }

  .quick-add input:focus { border-color: var(--accent); }

  .quick-add button {
    width: 28px;
    height: 28px;
    border: none;
    border-radius: 6px;
    background: var(--accent);
    color: white;
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    line-height: 1;
  }

  .pool-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px;
  }

  .pool-section-label {
    font-size: 10px;
    letter-spacing: 1px;
    color: var(--text3);
    text-transform: uppercase;
    padding: 6px 4px 4px;
  }

  .pool-task {
    padding: 8px 10px;
    margin-bottom: 4px;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 12px;
    cursor: grab;
    background: var(--surface);
    color: var(--text);
    user-select: none;
    transition: all 0.1s;
    position: relative;
  }

  .pool-task:hover { border-color: var(--accent); background: var(--accent-light); }
  .pool-task:active { cursor: grabbing; opacity: 0.7; }

  .pool-task.routine { border-left: 3px solid var(--accent); }
  .pool-task.done { opacity: 0.4; text-decoration: line-through; }

  .task-label { display: block; margin-bottom: 2px; }
  .task-meta { font-size: 10px; color: var(--text3); }

  /* CALENDAR */
  .cal-wrap {
    flex: 1;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  .cal-scroll {
    flex: 1;
    overflow-y: auto;
    position: relative;
  }

  .cal-grid {
    display: flex;
    position: relative;
    min-height: calc(var(--hour-h) * 24);
  }

  .time-col {
    width: 52px;
    flex-shrink: 0;
    position: relative;
  }

  .time-label {
    position: absolute;
    right: 8px;
    font-size: 10px;
    color: var(--text3);
    transform: translateY(-50%);
    white-space: nowrap;
  }

  .events-col {
    flex: 1;
    position: relative;
    border-left: 1px solid var(--border);
  }

  .hour-line {
    position: absolute;
    left: 0; right: 0;
    border-top: 1px solid var(--border);
  }

  .half-line {
    position: absolute;
    left: 0; right: 0;
    border-top: 1px dashed var(--border);
    opacity: 0.5;
  }

  /* DROP ZONE highlight */
  .events-col.drag-over { background: var(--accent-light); }

  /* CURRENT TIME */
  .now-line {
    position: absolute;
    left: 0; right: 0;
    height: 2px;
    background: var(--accent);
    z-index: 10;
    pointer-events: none;
  }

  .now-dot {
    position: absolute;
    left: -4px;
    top: -4px;
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: var(--accent);
  }

  /* CALENDAR EVENT */
  .cal-event {
    position: absolute;
    left: 4px;
    right: 4px;
    border-radius: 8px;
    padding: 6px 8px;
    font-size: 12px;
    cursor: grab;
    user-select: none;
    overflow: hidden;
    z-index: 5;
    transition: box-shadow 0.1s;
  }

  .cal-event:active { cursor: grabbing; }
  .cal-event:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.12); z-index: 6; }

  .cal-event.routine-ev {
    background: #fff8f2;
    border: 1.5px solid var(--accent);
    color: var(--text);
  }

  .cal-event.task-ev {
    background: #f0f4ff;
    border: 1.5px solid #7e9ff0;
    color: var(--text);
  }

  .cal-event.unforeseen-ev {
    background: #fff0f0;
    border: 1.5px solid #e07070;
    color: var(--text);
  }

  .cal-event.done-ev {
    opacity: 0.45;
    text-decoration: line-through;
  }

  .ev-title {
    font-size: 12px;
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .ev-time { font-size: 10px; color: var(--text2); margin-top: 1px; }

  .ev-check {
    position: absolute;
    top: 6px;
    right: 6px;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    border: 1.5px solid currentColor;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 9px;
    opacity: 0.5;
    background: white;
  }

  .ev-check:hover { opacity: 1; }

  /* Resize handle */
  .ev-resize {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 8px;
    cursor: ns-resize;
    border-radius: 0 0 8px 8px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .ev-resize::after {
    content: '';
    width: 24px;
    height: 2px;
    border-radius: 2px;
    background: currentColor;
    opacity: 0.2;
  }

  /* UNFORESEEN BUTTON */
  .unforeseen-btn {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: #e07070;
    color: white;
    border: none;
    border-radius: 50px;
    padding: 10px 18px;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    cursor: pointer;
    box-shadow: 0 4px 16px rgba(224,112,112,0.4);
    z-index: 100;
    transition: transform 0.1s;
  }

  .unforeseen-btn:hover { transform: scale(1.04); }

  /* MODAL */
  .modal-bg {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.3);
    z-index: 200;
    align-items: center;
    justify-content: center;
  }

  .modal-bg.open { display: flex; }

  .modal {
    background: var(--surface);
    border-radius: 14px;
    padding: 24px;
    width: 320px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.15);
  }

  .modal h3 {
    font-family: 'Fraunces', serif;
    font-size: 18px;
    margin-bottom: 16px;
  }

  .modal input, .modal select {
    width: 100%;
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    padding: 8px 10px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--surface2);
    color: var(--text);
    margin-bottom: 10px;
    outline: none;
  }

  .modal input:focus, .modal select:focus { border-color: var(--accent); }

  .modal-row { display: flex; gap: 8px; }

  .modal-btn {
    flex: 1;
    padding: 9px;
    border-radius: 8px;
    border: 1px solid var(--border);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    cursor: pointer;
    background: none;
    color: var(--text);
  }

  .modal-btn.primary {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }

  .scrollbar-thin::-webkit-scrollbar { width: 4px; }
  .scrollbar-thin::-webkit-scrollbar-track { background: transparent; }
  .scrollbar-thin::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">day<span>.</span>plan</div>
  <div style="font-size:11px;color:var(--text3)" id="date-display"></div>
</div>

<div class="week-strip" id="week-strip"></div>

<div class="main">
  <!-- POOL -->
  <div class="pool">
    <div class="pool-header">
      <div class="pool-title">Task Pool</div>
      <div class="quick-add">
        <input type="text" id="pool-input" placeholder="Add task..." maxlength="60">
        <button onclick="addPoolTask()">+</button>
      </div>
    </div>
    <div class="pool-list scrollbar-thin" id="pool-list"></div>
  </div>

  <!-- CALENDAR -->
  <div class="cal-wrap">
    <div class="cal-scroll scrollbar-thin" id="cal-scroll">
      <div class="cal-grid" id="cal-grid">
        <div class="time-col" id="time-col"></div>
        <div class="events-col" id="events-col"></div>
      </div>
    </div>
  </div>
</div>

<!-- UNFORESEEN -->
<button class="unforeseen-btn" onclick="openUnforeseen()">+ Unforeseen</button>

<!-- MODAL -->
<div class="modal-bg" id="modal-bg">
  <div class="modal">
    <h3 id="modal-title">Add Task</h3>
    <input type="text" id="m-name" placeholder="Task name">
    <div style="display:flex;gap:8px">
      <input type="time" id="m-start" style="flex:1">
      <input type="time" id="m-end" style="flex:1">
    </div>
    <select id="m-type">
      <option value="task-ev">Regular task</option>
      <option value="unforeseen-ev">Unforeseen</option>
      <option value="routine-ev">Routine</option>
    </select>
    <div class="modal-row">
      <button class="modal-btn" onclick="closeModal()">Cancel</button>
      <button class="modal-btn primary" onclick="confirmModal()">Add to day</button>
    </div>
  </div>
</div>

<script>
// ── STATE ──────────────────────────────────────────────────────────────
const DAYS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const today = new Date();
today.setHours(0,0,0,0);

let selectedDate = new Date(today);
let events = {}; // keyed by dateStr
let poolTasks = [];
let dragState = null;
let modalCallback = null;

// ── INITIAL DATA ────────────────────────────────────────────────────────
const routineTemplates = [
  { name: 'Exercise', start: '07:30', end: '08:30', type: 'routine-ev' },
  { name: 'Deep work — study', start: '09:00', end: '11:00', type: 'routine-ev' },
  { name: 'Importadora JV', start: '12:00', end: '13:00', type: 'routine-ev' },
  { name: 'Deep work #2', start: '14:00', end: '16:00', type: 'routine-ev' },
];

const defaultPool = [
  { id: uid(), name: 'Check emails', type: 'task' },
  { id: uid(), name: 'Review tutorials', type: 'task' },
  { id: uid(), name: 'Call Emily', type: 'task' },
  { id: uid(), name: 'Talk to immigration agent', type: 'task' },
  { id: uid(), name: 'Work on personal project', type: 'task' },
];

function uid() { return Math.random().toString(36).slice(2,9); }

function dateStr(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function getEvents(d) {
  const k = dateStr(d);
  if (!events[k]) {
    // seed routine for this day
    events[k] = routineTemplates.map(t => ({
      id: uid(), name: t.name,
      start: t.start, end: t.end,
      type: t.type, done: false
    }));
  }
  return events[k];
}

function timeToY(t) {
  const [h,m] = t.split(':').map(Number);
  return (h + m/60) * 64;
}

function yToTime(y) {
  const totalMins = Math.round((y / 64) * 60 / 15) * 15;
  const h = Math.floor(totalMins / 60);
  const m = totalMins % 60;
  return `${String(Math.min(h,23)).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
}

function fmtTime(t) {
  const [h,m] = t.split(':').map(Number);
  const ampm = h >= 12 ? 'pm' : 'am';
  return `${h%12||12}:${String(m).padStart(2,'0')}${ampm}`;
}

// ── WEEK STRIP ──────────────────────────────────────────────────────────
function renderWeekStrip() {
  const strip = document.getElementById('week-strip');
  strip.innerHTML = '';
  for (let i = 0; i < 7; i++) {
    const d = new Date(today);
    d.setDate(today.getDate() + i);
    const btn = document.createElement('button');
    btn.className = 'day-btn' +
      (d.getTime() === today.getTime() ? ' today' : '') +
      (d.getTime() === selectedDate.getTime() ? ' active' : '');
    btn.innerHTML = `<span class="dow">${DAYS[d.getDay()]}</span><span class="dom">${d.getDate()}</span>`;
    btn.onclick = () => { selectedDate = new Date(d); renderAll(); };
    strip.appendChild(btn);
  }
  const dd = selectedDate;
  document.getElementById('date-display').textContent =
    `${DAYS[dd.getDay()]}, ${MONTHS[dd.getMonth()]} ${dd.getDate()}`;
}

// ── TIME GRID ───────────────────────────────────────────────────────────
function renderGrid() {
  const timeCol = document.getElementById('time-col');
  const eventsCol = document.getElementById('events-col');
  timeCol.innerHTML = '';
  // remove old lines
  eventsCol.querySelectorAll('.hour-line,.half-line,.now-line').forEach(e=>e.remove());

  for (let h = 0; h < 24; h++) {
    const y = h * 64;
    const lbl = document.createElement('div');
    lbl.className = 'time-label';
    lbl.style.top = y + 'px';
    lbl.textContent = h === 0 ? '' : `${h%12||12}${h<12?'am':'pm'}`;
    timeCol.appendChild(lbl);

    const line = document.createElement('div');
    line.className = 'hour-line';
    line.style.top = y + 'px';
    eventsCol.appendChild(line);

    const half = document.createElement('div');
    half.className = 'half-line';
    half.style.top = (y + 32) + 'px';
    eventsCol.appendChild(half);
  }

  // now line
  const now = new Date();
  if (dateStr(now) === dateStr(selectedDate)) {
    const nowY = (now.getHours() + now.getMinutes()/60) * 64;
    const nl = document.createElement('div');
    nl.className = 'now-line';
    nl.style.top = nowY + 'px';
    nl.innerHTML = '<div class="now-dot"></div>';
    eventsCol.appendChild(nl);
  }
}

// ── EVENTS ──────────────────────────────────────────────────────────────
function renderEvents() {
  const col = document.getElementById('events-col');
  col.querySelectorAll('.cal-event').forEach(e=>e.remove());

  const evs = getEvents(selectedDate);
  evs.forEach(ev => {
    const top = timeToY(ev.start);
    const bot = timeToY(ev.end);
    const h = Math.max(bot - top, 24);

    const el = document.createElement('div');
    el.className = `cal-event ${ev.type} ${ev.done ? 'done-ev' : ''}`;
    el.style.top = top + 'px';
    el.style.height = h + 'px';
    el.dataset.id = ev.id;

    el.innerHTML = `
      <div class="ev-title" style="padding-right:20px">${ev.name}</div>
      <div class="ev-time">${fmtTime(ev.start)} – ${fmtTime(ev.end)}</div>
      <div class="ev-check" onclick="toggleDone('${ev.id}',event)">${ev.done?'✓':''}</div>
      <div class="ev-resize" data-id="${ev.id}"></div>
    `;

    // drag to move
    el.addEventListener('mousedown', onEventMouseDown);
    // drag to resize
    el.querySelector('.ev-resize').addEventListener('mousedown', onResizeMouseDown);

    col.appendChild(el);
  });
}

function toggleDone(id, e) {
  e.stopPropagation();
  const evs = getEvents(selectedDate);
  const ev = evs.find(x=>x.id===id);
  if (ev) { ev.done = !ev.done; renderEvents(); }
}

// ── DRAG: MOVE EVENT ────────────────────────────────────────────────────
function onEventMouseDown(e) {
  if (e.target.classList.contains('ev-resize') || e.target.classList.contains('ev-check')) return;
  e.preventDefault();
  const el = e.currentTarget;
  const id = el.dataset.id;
  const evs = getEvents(selectedDate);
  const ev = evs.find(x=>x.id===id);
  if (!ev) return;

  const startY = e.clientY;
  const origTop = timeToY(ev.start);
  const origBot = timeToY(ev.end);
  const dur = origBot - origTop;

  dragState = { type:'move', id, startY, origTop, dur };

  document.addEventListener('mousemove', onDragMove);
  document.addEventListener('mouseup', onDragUp);
}

function onResizeMouseDown(e) {
  e.preventDefault();
  e.stopPropagation();
  const id = e.currentTarget.dataset.id;
  const evs = getEvents(selectedDate);
  const ev = evs.find(x=>x.id===id);
  if (!ev) return;

  dragState = { type:'resize', id, startY: e.clientY, origEnd: timeToY(ev.end) };
  document.addEventListener('mousemove', onDragMove);
  document.addEventListener('mouseup', onDragUp);
}

function onDragMove(e) {
  if (!dragState) return;
  const col = document.getElementById('events-col');
  const rect = col.getBoundingClientRect();
  const evs = getEvents(selectedDate);
  const ev = evs.find(x=>x.id===dragState.id);
  if (!ev) return;

  if (dragState.type === 'move') {
    const dy = e.clientY - dragState.startY;
    let newTop = dragState.origTop + dy;
    newTop = Math.max(0, Math.min(newTop, 24*64 - dragState.dur));
    const snapped = Math.round(newTop / 16) * 16;
    ev.start = yToTime(snapped);
    ev.end = yToTime(snapped + dragState.dur);
  } else {
    const dy = e.clientY - dragState.startY;
    let newEnd = dragState.origEnd + dy;
    const startY = timeToY(ev.start);
    newEnd = Math.max(startY + 16, Math.min(newEnd, 24*64));
    const snapped = Math.round(newEnd / 16) * 16;
    ev.end = yToTime(snapped);
  }
  renderEvents();
}

function onDragUp() {
  dragState = null;
  document.removeEventListener('mousemove', onDragMove);
  document.removeEventListener('mouseup', onDragUp);
}

// ── DRAG: POOL → CALENDAR ───────────────────────────────────────────────
function renderPool() {
  const list = document.getElementById('pool-list');
  list.innerHTML = '';

  const label = document.createElement('div');
  label.className = 'pool-section-label';
  label.textContent = 'Backlog';
  list.appendChild(label);

  poolTasks.forEach(t => {
    const el = document.createElement('div');
    el.className = `pool-task ${t.done ? 'done' : ''}`;
    el.draggable = true;
    el.innerHTML = `<span class="task-label">${t.name}</span>`;
    el.addEventListener('dragstart', e => {
      e.dataTransfer.setData('poolId', t.id);
    });
    list.appendChild(el);
  });
}

function addPoolTask() {
  const inp = document.getElementById('pool-input');
  const name = inp.value.trim();
  if (!name) return;
  poolTasks.push({ id: uid(), name, done: false });
  inp.value = '';
  renderPool();
}

document.getElementById('pool-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') addPoolTask();
});

// drop on calendar
const eventsCol = document.getElementById('events-col');

eventsCol.addEventListener('dragover', e => {
  e.preventDefault();
  eventsCol.classList.add('drag-over');
});

eventsCol.addEventListener('dragleave', () => {
  eventsCol.classList.remove('drag-over');
});

eventsCol.addEventListener('drop', e => {
  e.preventDefault();
  eventsCol.classList.remove('drag-over');
  const poolId = e.dataTransfer.getData('poolId');
  if (!poolId) return;
  const task = poolTasks.find(t=>t.id===poolId);
  if (!task) return;

  const rect = eventsCol.getBoundingClientRect();
  const y = e.clientY - rect.top;
  const snapped = Math.round(y / 16) * 16;
  const startT = yToTime(snapped);
  const [sh,sm] = startT.split(':').map(Number);
  const endMins = (sh*60+sm+60);
  const endT = `${String(Math.floor(Math.min(endMins,23*60)/60)).padStart(2,'0')}:${String(Math.min(endMins,23*60)%60).padStart(2,'0')}`;

  const evs = getEvents(selectedDate);
  evs.push({ id: uid(), name: task.name, start: startT, end: endT, type: 'task-ev', done: false });
  poolTasks = poolTasks.filter(t=>t.id!==poolId);
  renderAll();
});

// ── UNFORESEEN ──────────────────────────────────────────────────────────
function openUnforeseen() {
  const now = new Date();
  const h = String(now.getHours()).padStart(2,'0');
  const m = String(Math.round(now.getMinutes()/15)*15%60).padStart(2,'0');
  const eh = String(now.getHours()+1).padStart(2,'0');
  document.getElementById('m-name').value = '';
  document.getElementById('m-start').value = `${h}:${m}`;
  document.getElementById('m-end').value = `${eh}:${m}`;
  document.getElementById('m-type').value = 'unforeseen-ev';
  document.getElementById('modal-title').textContent = 'Unforeseen Task';
  document.getElementById('modal-bg').classList.add('open');
  modalCallback = (data) => {
    const evs = getEvents(selectedDate);
    evs.push({ id: uid(), name: data.name, start: data.start, end: data.end, type: data.type, done: false });
    // push overlapping events down
    pushOverlapping(evs, data.start, data.end);
    renderAll();
  };
  setTimeout(() => document.getElementById('m-name').focus(), 50);
}

function pushOverlapping(evs, start, end) {
  const startY = timeToY(start);
  const endY = timeToY(end);
  const dur = endY - startY;
  evs.forEach(ev => {
    const evStartY = timeToY(ev.start);
    const evEndY = timeToY(ev.end);
    if (evStartY >= startY && evStartY < endY) {
      const evDur = evEndY - evStartY;
      const newStart = yToTime(endY);
      const newEnd = yToTime(endY + evDur);
      ev.start = newStart;
      ev.end = newEnd;
    }
  });
}

function closeModal() {
  document.getElementById('modal-bg').classList.remove('open');
  modalCallback = null;
}

function confirmModal() {
  const name = document.getElementById('m-name').value.trim();
  const start = document.getElementById('m-start').value;
  const end = document.getElementById('m-end').value;
  const type = document.getElementById('m-type').value;
  if (!name || !start || !end) return;
  if (modalCallback) modalCallback({ name, start, end, type });
  closeModal();
}

document.getElementById('m-name').addEventListener('keydown', e => {
  if (e.key === 'Enter') confirmModal();
});

document.getElementById('modal-bg').addEventListener('click', e => {
  if (e.target === document.getElementById('modal-bg')) closeModal();
});

// ── SCROLL TO CURRENT/MORNING ───────────────────────────────────────────
function scrollToNow() {
  const now = new Date();
  const isToday = dateStr(now) === dateStr(selectedDate);
  const h = isToday ? Math.max(now.getHours() - 1, 6) : 7;
  document.getElementById('cal-scroll').scrollTop = h * 64;
}

// ── RENDER ALL ──────────────────────────────────────────────────────────
function renderAll() {
  renderWeekStrip();
  renderGrid();
  renderEvents();
  renderPool();
}

// ── INIT ────────────────────────────────────────────────────────────────
poolTasks = [...defaultPool];
renderAll();
scrollToNow();

// update now-line every minute
setInterval(() => {
  renderGrid();
  renderEvents();
}, 60000);
</script>
